<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100">
  <defs>
    <filter id="ultraPhotoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="realisticDrop" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>

    <clipPath id="buttonRect">
      <rect x="10" y="10" width="380" height="80" rx="25" />
    </clipPath>
  </defs>

  <rect x="5" y="5" width="390" height="90" rx="30" fill="#000" stroke="#00FFFF" stroke-width="3" filter="url(#ultraPhotoGlow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </rect>

  <g clip-path="url(#buttonRect)" font-family="monospace" font-size="8" fill="#00CC99" opacity="0.15">
    <text x="20" y="0">1011010101<animate attributeName="y" values="0;100" dur="2s" repeatCount="indefinite"/></text>
    <text x="50" y="0">0101101100<animate attributeName="y" values="0;100" dur="3s" repeatCount="indefinite"/></text>
    <text x="80" y="0">1100101011<animate attributeName="y" values="0;100" dur="2.5s" repeatCount="indefinite"/></text>
    <text x="110" y="0">0011010101<animate attributeName="y" values="0;100" dur="3.5s" repeatCount="indefinite"/></text>
    <text x="140" y="0">1010110110<animate attributeName="y" values="0;100" dur="2.8s" repeatCount="indefinite"/></text>
    <text x="170" y="0">0110101011<animate attributeName="y" values="0;100" dur="3.2s" repeatCount="indefinite"/></text>
    <text x="200" y="0">1001011010<animate attributeName="y" values="0;100" dur="3.8s" repeatCount="indefinite"/></text>
    <text x="230" y="0">1101010101<animate attributeName="y" values="0;100" dur="2.6s" repeatCount="indefinite"/></text>
    <text x="260" y="0">0101110100<animate attributeName="y" values="0;100" dur="4.2s" repeatCount="indefinite"/></text>
    <text x="290" y="0">1011010101<animate attributeName="y" values="0;100" dur="2s" repeatCount="indefinite"/></text>
    <text x="320" y="0">0101101100<animate attributeName="y" values="0;100" dur="3s" repeatCount="indefinite"/></text>
    <text x="350" y="0">1100101011<animate attributeName="y" values="0;100" dur="2.5s" repeatCount="indefinite"/></text>
    <text x="380" y="0">0011010101<animate attributeName="y" values="0;100" dur="3.5s" repeatCount="indefinite"/></text>
  </g>

  <g clip-path="url(#buttonRect)">
    <circle cx="80" cy="35" r="14" fill="url(#realisticDrop)" opacity="0.9">
      <animate attributeName="cy" values="35;38;35" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="65" r="12" fill="url(#realisticDrop)" opacity="0.8">
      <animate attributeName="cy" values="65;62;65" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="150" cy="25" r="8" fill="url(#realisticDrop)" opacity="0.7">
      <animate attributeName="r" values="8;8.5;8" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="75" r="9" fill="url(#realisticDrop)" opacity="0.6">
      <animate attributeName="r" values="9;9.5;9" dur="3.5s" repeatCount="indefinite" />
    </circle>

    <circle cx="40" cy="60" r="6" fill="url(#realisticDrop)" opacity="0.5" />
    <circle cx="360" cy="20" r="5" fill="url(#realisticDrop)" opacity="0.4" />
    <circle cx="200" cy="50" r="7" fill="url(#realisticDrop)" opacity="0.5" />
    <circle cx="110" cy="85" r="4" fill="url(#realisticDrop)" opacity="0.3" />
    <circle cx="290" cy="15" r="3" fill="url(#realisticDrop)" opacity="0.2" />
  </g>

  <text x="200" y="60" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="#00FFFF" filter="url(#ultraPhotoGlow)" letter-spacing="4">
    YOUTUBE
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
    <animate attributeName="letter-spacing" values="4;7;4" dur="6s" repeatCount="indefinite" />
  </text>

  <rect x="150" y="80" width="100" height="3" rx="1.5" fill="#00FFFF" opacity="0.7" filter="url(#ultraPhotoGlow)">
    <animate attributeName="width" values="60;140;60" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="170;130;170" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
