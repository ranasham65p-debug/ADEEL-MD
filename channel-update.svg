<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <linearGradient id="whatsappWave" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="50%" stop-color="#128C7E"/>
      <stop offset="100%" stop-color="#25D366"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur" opacity="0.4"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="80" fill="#000000" rx="25" stroke="url(#whatsappWave)" stroke-width="3"/>
  <text x="300" y="48" text-anchor="middle" font-family="Arial" font-size="32" font-weight="900" fill="url(#whatsappWave)" filter="url(#softGlow)">
    JOIN CHANNEL
  </text>
</svg>
